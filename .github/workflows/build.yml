name: Fluxen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Build
        run: |
          flutter create --org com.fluxen --project-name fluxen_currency --platforms android /tmp/app
          rm -rf /tmp/app/lib
          cp -r fluxen-final/flutter/lib /tmp/app/lib
          cp fluxen-final/flutter/pubspec.yaml /tmp/app/pubspec.yaml
          python3 -c "
          m = open('/tmp/app/android/app/src/main/AndroidManifest.xml').read()
          new = m.replace('<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\">', '<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"><uses-permission android:name=\"android.permission.INTERNET\"/><uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\"/>')
          new = new.replace('android:name=\"\${applicationName}\"', 'android:name=\"\${applicationName}\" android:usesCleartextTraffic=\"true\" android:label=\"Fluxen\"')
          open('/tmp/app/android/app/src/main/AndroidManifest.xml', 'w').write(new)
          print('Manifest updated')
          "
          cd /tmp/app
          flutter pub get
          flutter build apk --release --target-platform android-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: Fluxen-APK
          path: /tmp/app/build/app/outputs/flutter-apk/app-release.apk

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: fluxen-final/web
          publish_branch: gh-pages
